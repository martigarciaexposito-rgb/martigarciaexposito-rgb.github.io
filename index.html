<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La nostra història</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg-0: #fff8ef;
      --bg-1: #ffe9d7;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-strong: rgba(255, 255, 255, 0.88);
      --surface-border: rgba(130, 86, 68, 0.14);
      --text: #4a2f2a;
      --muted: rgba(74, 47, 42, 0.76);
      --accent: #ff7a59;
      --accent-2: #ffbf6b;
      --shadow: 0 18px 46px rgba(124, 74, 52, 0.18);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Aptos", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 170, 130, 0.36), transparent 26%),
        radial-gradient(circle at 88% 12%, rgba(255, 208, 144, 0.28), transparent 22%),
        linear-gradient(180deg, #fff9f2 0%, #fff0e5 42%, #ffe6d8 100%);
      color: var(--text);
      text-align: center;
      line-height: 1.55;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.6) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.08), transparent 78%);
      opacity: 0.12;
    }

    header {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      padding: 34px 20px 28px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 204, 150, 0.5), transparent 34%),
        linear-gradient(180deg, #fff4e7 0%, #ffe4d1 62%, #ffd7c0 100%);
      border-bottom: 0;
      box-shadow: none;
    }

    header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.45), transparent 42%);
      pointer-events: none;
    }

    header::after {
      content: "";
      position: absolute;
      inset: auto 0 -1px;
      height: 1px;
      background: rgba(74, 47, 42, 0.08);
      pointer-events: none;
    }

    .hero-kicker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 12px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(124, 74, 52, 0.12);
      background: rgba(255, 255, 255, 0.72);
      font-size: 0.74em;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(74, 47, 42, 0.84);
      backdrop-filter: blur(14px);
    }

    h1 {
      margin: 0;
      max-width: 11ch;
      margin-inline: auto;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(2.2rem, 5vw, 4.4rem);
      line-height: 0.92;
      letter-spacing: -0.045em;
      text-shadow: 0 10px 22px rgba(255, 255, 255, 0.35);
    }

    .hero-subtitle {
      margin: 12px auto 0;
      max-width: 34rem;
      font-size: 0.98em;
      color: var(--muted);
    }

    #contador {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 16px auto 0;
      padding: 12px 18px;
      max-width: min(34rem, calc(100vw - 32px));
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(255, 244, 235, 0.92));
      border: 1px solid rgba(124, 74, 52, 0.12);
      font-size: 1.02em;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 34px rgba(124, 74, 52, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    #contador:hover {
      transform: translateY(-2px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 247, 240, 0.98));
      box-shadow: 0 22px 42px rgba(124, 74, 52, 0.18);
    }

    #contador:active {
      transform: translateY(0);
    }

    .contador-etiqueta {
      font-size: 0.76em;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.82;
      white-space: nowrap;
    }

    .contador-valor {
      font-weight: 700;
    }

    .timeline-wrap {
      padding: 12px 0 8px;
      overflow: hidden;
    }

    .timeline {
      position: relative;
      max-width: 1160px;
      margin: 0 auto;
      padding: 6px 16px 18px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 50%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(124, 74, 52, 0.12) 10%, rgba(255, 122, 89, 0.28) 50%, rgba(124, 74, 52, 0.12) 90%, transparent);
      transform: translateY(-50%);
    }

    .section-title {
      margin: 0 16px 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.25rem, 2vw, 1.6rem);
      text-align: center;
    }

    .timeline-viewport {
      overflow: hidden;
      position: relative;
      padding: 4px 4px 12px;
      touch-action: pan-y;
      cursor: grab;
      scrollbar-width: none;
      mask-image: linear-gradient(90deg, transparent, black 5%, black 95%, transparent);
    }

    .timeline-viewport.dragging {
      cursor: grabbing;
    }

    .timeline-viewport::-webkit-scrollbar {
      display: none;
    }

    .timeline-track {
      display: flex;
      gap: 18px;
      width: max-content;
      padding-bottom: 4px;
      will-change: transform;
    }

    .timeline-cycle {
      display: flex;
      gap: 18px;
      padding-right: 18px;
      flex: 0 0 auto;
    }

    .timeline-item {
      flex: 0 0 auto;
      width: clamp(170px, 44vw, 260px);
    }

    .timeline-item img {
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center center;
      display: block;
      border-radius: 24px;
      background: #fff;
      border: 1px solid rgba(124, 74, 52, 0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease, filter 0.3s ease;
      box-shadow: 0 18px 42px rgba(124, 74, 52, 0.16);
      position: relative;
      z-index: 1;
      user-select: none;
      -webkit-user-drag: none;
      filter: saturate(1.1) contrast(1.04);
    }

    .timeline-item:nth-child(3) img {
      object-position: 42% center;
    }

    .timeline-item img:hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 24px 54px rgba(124, 74, 52, 0.22);
      filter: saturate(1.18) contrast(1.08);
    }

    .panel {
      max-width: 960px;
      margin: 14px auto 0;
      padding: 0 16px 28px;
    }

    .card {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.86) 0%, rgba(255, 248, 240, 0.94) 100%);
      border: 1px solid rgba(124, 74, 52, 0.1);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top right, rgba(255, 122, 89, 0.1), transparent 34%);
      pointer-events: none;
    }

    .quiz-card {
      text-align: left;
    }

    .quiz-card h2 {
      position: relative;
      z-index: 1;
      margin: 0 0 10px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1.45rem, 2vw, 1.8rem);
      text-align: center;
    }

    .quiz-card p {
      position: relative;
      z-index: 1;
      margin: 0 0 18px;
      text-align: center;
      color: var(--muted);
    }

    .quiz-meta {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 0.93em;
      color: rgba(74, 47, 42, 0.8);
    }

    .quiz-progress {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(124, 74, 52, 0.1);
      overflow: hidden;
      margin-top: 8px;
      box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.22);
    }

    .quiz-progress > div {
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width 0.25s ease;
    }

    .quiz-pregunta {
      position: relative;
      z-index: 1;
      font-size: 1.2em;
      margin: 4px 0 16px;
      text-align: center;
    }

    .quiz-opcions {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .quiz-opcions button {
      text-align: left;
      width: 100%;
      margin: 0;
      padding: 16px 18px;
      border: 1px solid rgba(124, 74, 52, 0.12);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
      font-size: 1em;
      cursor: pointer;
      min-height: 54px;
      transition: transform 0.22s ease, background 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      box-shadow: 0 10px 22px rgba(124, 74, 52, 0.12);
    }

    .quiz-opcions button:hover {
      background: rgba(255, 247, 240, 1);
      transform: translateY(-2px);
      border-color: rgba(255, 122, 89, 0.22);
    }

    .quiz-opcions button.correcte {
      background: rgba(125, 211, 193, 0.2);
      box-shadow: 0 0 0 1px rgba(125, 211, 193, 0.28) inset;
    }

    .quiz-opcions button.erroni {
      background: rgba(255, 140, 140, 0.2);
      box-shadow: 0 0 0 1px rgba(255, 140, 140, 0.28) inset;
    }

    .quiz-accio {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .accio-secundaria {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
    }

    .missatge-resultat {
      position: relative;
      z-index: 1;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(124, 74, 52, 0.1);
      min-height: 56px;
      text-align: center;
    }

    button {
      margin: 0;
      padding: 15px 25px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      color: white;
      font-size: 1em;
      cursor: pointer;
      min-height: 48px;
      max-width: 100%;
      box-shadow: 0 14px 32px rgba(255, 122, 89, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 38px rgba(255, 122, 89, 0.26);
      filter: brightness(1.03);
    }

    button:focus-visible,
    #contador:focus-visible,
    .quiz-opcions button:focus-visible {
      outline: 2px solid rgba(255, 207, 138, 0.8);
      outline-offset: 3px;
    }

    @media (prefers-reduced-motion: reduce) {
      .timeline-item img,
      #contador,
      button,
      .quiz-opcions button {
        transition: none;
      }
    }

    @media (max-width: 640px) {
      header {
        padding: 24px 16px 20px;
      }

      h1 {
        font-size: 2rem;
      }

      .hero-subtitle {
        font-size: 0.96em;
      }

      #contador {
        font-size: 0.94em;
        flex-direction: column;
        gap: 4px;
        padding: 12px 14px;
      }

      .contador-etiqueta {
        font-size: 0.7em;
      }

      .timeline-wrap {
        padding-top: 12px;
      }

      .timeline {
        padding: 8px 12px 14px;
      }

      .timeline::before {
        left: 12px;
        right: 12px;
      }

      .timeline-item {
        width: clamp(180px, 70vw, 250px);
      }

      .timeline-item img {
        border-radius: 20px;
      }

      .panel {
        padding: 0 12px 20px;
      }

      button {
        width: 100%;
        padding: 14px 18px;
      }

      .card {
        padding: 18px;
      }

      .quiz-meta {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

<header>
  <p class="hero-kicker">Un recordatori en moviment</p>
  <h1>La nostra història</h1>
  <p class="hero-subtitle">Un petit espai amb fotos, temps compartit i un joc fet per tu.</p>
  <div id="contador" role="button" tabindex="0" aria-label="Canviar la vista del comptador"></div>
</header>

<section class="timeline-wrap" aria-label="Línia del temps de fotos">
  <h2 class="section-title">Línia del temps</h2>
  <div class="timeline">
    <div class="timeline-viewport">
      <div class="timeline-track" id="timelineTrack"></div>
    </div>
  </div>
</section>

<section class="panel">
  <div class="card quiz-card" id="quizCard">
    <h2>Joc de preguntes</h2>
    <p>Tria les respostes i comprova quant de bé us coneixeu.</p>

    <div class="quiz-meta">
      <div>
        <div id="quizPosicio">Pregunta 1 de 3</div>
        <div class="quiz-progress" aria-hidden="true"><div id="quizBarra"></div></div>
      </div>
      <div id="quizPunts">0 punts</div>
    </div>

    <div id="quizPregunta" class="quiz-pregunta"></div>
    <div id="quizOpcions" class="quiz-opcions"></div>

    <div class="quiz-accio">
      <button class="accio-secundaria" id="quizReiniciar" type="button">Reiniciar joc</button>
    </div>

    <div id="quizResultat" class="missatge-resultat" aria-live="polite"></div>
  </div>
</section>

<script>
  const inicio = new Date("2022-11-14T17:00:00");
  const contador = document.getElementById("contador");
  const unitatsContador = ["complet", "hores", "minuts", "segons"];
  let modeContador = 0;

  function actualizarContador() {
    const ahora = new Date();
    const diff = ahora - inicio;

    const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diff / (1000 * 60)) % 60);

    let valor = "";
    let etiqueta = "";

    if (unitatsContador[modeContador] === "complet") {
      valor = `${dias} dies, ${horas} hores i ${minutos} minuts`;
      etiqueta = "Temps junts";
    } else if (unitatsContador[modeContador] === "hores") {
      valor = `${Math.floor(diff / (1000 * 60 * 60))} hores`;
      etiqueta = "Vista ràpida";
    } else if (unitatsContador[modeContador] === "minuts") {
      valor = `${Math.floor(diff / (1000 * 60))} minuts`;
      etiqueta = "Vista detallada";
    } else {
      valor = `${Math.floor(diff / 1000)} segons`;
      etiqueta = "En directe";
    }

    contador.innerHTML = `
      <span class="contador-etiqueta">${etiqueta}</span>
      <span class="contador-valor">${valor} ❤</span>
    `;
  }

  setInterval(actualizarContador, 1000);
  contador.addEventListener("click", () => {
    modeContador = (modeContador + 1) % unitatsContador.length;
    actualizarContador();
  });
  contador.addEventListener("keydown", (event) => {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      modeContador = (modeContador + 1) % unitatsContador.length;
      actualizarContador();
    }
  });

  const timelineTrack = document.getElementById("timelineTrack");
  const timelineViewport = document.querySelector(".timeline-viewport");
  const imagenes = Array.from({ length: 40 }, (_, index) => {
    const numero = String(index + 1).padStart(2, "0");
    return `img/foto-${numero}.jpg`;
  });

  const gapMarquee = 12;
  const velocidadMarquee = 0.09;
  let bolsaImagenes = [];
  let firmaAnterior = "";
  let cicloActualFirma = "";
  let cicloAncho = 0;
  let ultimaAnimacion = null;
  let desplazamiento = 0;
  let arrastreActivo = false;
  let arrastreInicioX = 0;
  let arrastreInicioDesplazamiento = 0;
  let pausaHasta = 0;
  let resumeTimer = null;

  function mezclar(array) {
    const resultado = [...array];
    for (let i = resultado.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [resultado[i], resultado[j]] = [resultado[j], resultado[i]];
    }
    return resultado;
  }

  function rellenarBolsa() {
    let intento = mezclar(imagenes);
    while (imagenes.length > 1 && intento.join("|") === firmaAnterior) {
      intento = mezclar(imagenes);
    }
    firmaAnterior = intento.join("|");
    bolsaImagenes = intento;
  }

  function siguienteImagen() {
    if (bolsaImagenes.length === 0) {
      rellenarBolsa();
    }
    return bolsaImagenes.shift();
  }

  function crearSecuenciaCiclo() {
    const secuencia = [];
    for (let i = 0; i < imagenes.length; i += 1) {
      secuencia.push(siguienteImagen());
    }
    return secuencia;
  }

  function crearElementoCarrusel(src) {
    const item = document.createElement("div");
    item.className = "timeline-item";

    const img = document.createElement("img");
    img.src = src;
    img.alt = "Fotografia de la història";
    img.loading = "lazy";
    img.draggable = false;

    item.appendChild(img);
    return item;
  }

  function crearCiclo(firmaAnteriorCiclo) {
    let secuencia = mezclar(imagenes);
    while (imagenes.length > 1 && secuencia.join("|") === firmaAnteriorCiclo) {
      secuencia = mezclar(imagenes);
    }

    const ciclo = document.createElement("div");
    ciclo.className = "timeline-cycle";
    secuencia.forEach((src) => ciclo.appendChild(crearElementoCarrusel(src)));

    return { ciclo, firma: secuencia.join("|") };
  }

  function reconstruirCarrusel() {
    timelineTrack.innerHTML = "";
    const primer = crearCiclo(cicloActualFirma);
    cicloActualFirma = primer.firma;
    timelineTrack.appendChild(primer.ciclo);

    const segon = crearCiclo(cicloActualFirma);
    cicloActualFirma = segon.firma;
    timelineTrack.appendChild(segon.ciclo);

    cicloAncho = primer.ciclo.getBoundingClientRect().width + gapMarquee;
    desplazamiento = 0;
    aplicarDesplazamiento();
  }

  function aplicarDesplazamiento() {
    timelineTrack.style.transform = `translate3d(${desplazamiento}px, 0, 0)`;
  }

  function rotarCiclo() {
    const primerCiclo = timelineTrack.firstElementChild;
    if (!primerCiclo) return;

    const anchoCiclo = primerCiclo.getBoundingClientRect().width + gapMarquee;
    primerCiclo.remove();
    const nuevo = crearCiclo(cicloActualFirma);
    cicloActualFirma = nuevo.firma;
    timelineTrack.appendChild(nuevo.ciclo);
    cicloAncho = anchoCiclo;
  }

  function limitarDesplazamiento() {
    if (cicloAncho <= 0) return;

    while (desplazamiento <= -cicloAncho) {
      desplazamiento += cicloAncho;
      rotarCiclo();
    }

    while (desplazamiento > 0) {
      desplazamiento -= cicloAncho;
    }

    aplicarDesplazamiento();
  }

  function iniciarArrastre(event) {
    if (event.button !== undefined && event.button !== 0) return;
    arrastreActivo = true;
    arrastreInicioX = event.clientX;
    arrastreInicioDesplazamiento = desplazamiento;
    pausaHasta = Number.POSITIVE_INFINITY;

    if (resumeTimer !== null) {
      clearTimeout(resumeTimer);
      resumeTimer = null;
    }

    timelineViewport.classList.add("dragging");
    timelineViewport.setPointerCapture?.(event.pointerId);
  }

  function moverArrastre(event) {
    if (!arrastreActivo) return;
    event.preventDefault();
    const deltaX = event.clientX - arrastreInicioX;
    desplazamiento = arrastreInicioDesplazamiento + deltaX;
    limitarDesplazamiento();
  }

  function finalizarArrastre(event) {
    if (!arrastreActivo) return;
    arrastreActivo = false;
    timelineViewport.classList.remove("dragging");

    try {
      timelineViewport.releasePointerCapture?.(event.pointerId);
    } catch (error) {
      // No-op.
    }

    pauseUp();
  }

  function pauseUp() {
    pausaHasta = performance.now() + 250;
    if (resumeTimer !== null) {
      clearTimeout(resumeTimer);
    }
    resumeTimer = setTimeout(() => {
      pausaHasta = 0;
      resumeTimer = null;
    }, 250);
  }

  rellenarBolsa();
  reconstruirCarrusel();
  window.addEventListener("resize", reconstruirCarrusel);

  timelineViewport.addEventListener("pointerdown", iniciarArrastre);
  window.addEventListener("pointermove", moverArrastre, { passive: false });
  window.addEventListener("pointerup", finalizarArrastre);
  window.addEventListener("pointercancel", finalizarArrastre);

  function animarCarrusel(tempsActual) {
    if (ultimaAnimacion === null) {
      ultimaAnimacion = tempsActual;
    }

    const delta = tempsActual - ultimaAnimacion;
    ultimaAnimacion = tempsActual;

    if (!arrastreActivo && tempsActual >= pausaHasta) {
      desplazamiento -= velocidadMarquee * delta;
      if (cicloAncho > 0 && desplazamiento <= -cicloAncho) {
        desplazamiento += cicloAncho;
        rotarCiclo();
      }
      aplicarDesplazamiento();
    }

    requestAnimationFrame(animarCarrusel);
  }

  requestAnimationFrame(animarCarrusel);

  const preguntes = [
    {
      pregunta: "On ens vam conèixer?",
      opcions: ["A l'institut", "A la platja", "En un concert"],
      correcta: 0,
    },
    {
      pregunta: "Quin és el nostre restaurant preferit?",
      opcions: ["La Tagliatella", "Casa Carmen","Enjoy It", "La Paradeta", "El Celler de Can Roca"],
      correcta: 2,
    },
    {
      pregunta: "Quin va ser el nostre primer viatge junts?",
      opcions: ["Madrid", "Menorca", "París", "Roma"],
      correcta: 1,
    },
    {
      pregunta: "Quin dia va començar la nostra relació?",
      opcions: ["14 de novembre de 2022", "23 de desembre de 2022", "1 de gener de 2023"],
      correcta: 0,
    },
    {
      pregunta: "Quina és la nostra cançó?",
      opcions: ["Perfect - Ed Sheeran", "La Flaca - Jarabe de Palo", "Contigo - La Otra", "Diamants - Els Catarres"],
      correcta: 3,
    },
    {
      pregunta: "Quin és el lloc on volem viatgar junts?",
      opcions: ["Nova York", "Japó", "Punta Cana", "Islàndia", "Grècia"],
      correcta: 2,
    }
  ];

  const quizPregunta = document.getElementById("quizPregunta");
  const quizOpcions = document.getElementById("quizOpcions");
  const quizPosicio = document.getElementById("quizPosicio");
  const quizBarra = document.getElementById("quizBarra");
  const quizPunts = document.getElementById("quizPunts");
  const quizResultat = document.getElementById("quizResultat");
  const quizReiniciar = document.getElementById("quizReiniciar");

  let preguntaActual = 0;
  let punts = 0;
  let respostaBloquejada = false;
  let transicioFinal = null;

  function renderQuiz() {
    const pregunta = preguntes[preguntaActual];
    quizPregunta.textContent = pregunta.pregunta;
    quizOpcions.innerHTML = "";
    quizPosicio.textContent = `Pregunta ${preguntaActual + 1} de ${preguntes.length}`;
    quizBarra.style.width = `${(preguntaActual / preguntes.length) * 100}%`;
    quizPunts.textContent = `${punts} punts`;
    respostaBloquejada = false;

    if (preguntaActual === 0 && punts === 0) {
      quizResultat.textContent = "Escull una opció per començar.";
    }

    pregunta.opcions.forEach((opcio, index) => {
      const boto = document.createElement("button");
      boto.type = "button";
      boto.textContent = opcio;
      boto.addEventListener("click", () => respondre(index));
      quizOpcions.appendChild(boto);
    });
  }

  function respondre(index) {
    if (respostaBloquejada) return;
    respostaBloquejada = true;

    const pregunta = preguntes[preguntaActual];
    const botons = [...quizOpcions.querySelectorAll("button")];

    botons.forEach((element, i) => {
      element.disabled = true;
      if (i === pregunta.correcta) element.classList.add("correcte");
      if (i === index && i !== pregunta.correcta) element.classList.add("erroni");
    });

    if (index === pregunta.correcta) {
      punts += 1;
      quizResultat.textContent = "Correcte. Bona memòria.";
    } else {
      quizResultat.textContent = `No és aquesta. La resposta correcta era "${pregunta.opcions[pregunta.correcta]}".`;
    }

    quizPunts.textContent = `${punts} punts`;

    setTimeout(() => {
      preguntaActual += 1;
      if (preguntaActual < preguntes.length) {
        renderQuiz();
      } else {
        quizPregunta.textContent = "Joc acabat";
        quizOpcions.innerHTML = "";
        quizPosicio.textContent = "Resultat final";
        quizBarra.style.width = "100%";
        quizResultat.textContent =
          punts === preguntes.length
            ? "Puntuació perfecta. Tens una sorpresa esperant-te."
            : `Has encertat ${punts} de ${preguntes.length}. No està gens malament.`;

        if (transicioFinal !== null) {
          clearTimeout(transicioFinal);
        }

        transicioFinal = setTimeout(() => {
          window.location.href = `premi.html?score=${punts}&total=${preguntes.length}`;
        }, 1100);
      }
    }, 700);
  }

  function reiniciarQuiz() {
    if (transicioFinal !== null) {
      clearTimeout(transicioFinal);
      transicioFinal = null;
    }

    preguntaActual = 0;
    punts = 0;
    quizBarra.style.width = "0%";
    quizResultat.textContent = "Escull una opció per començar.";
    renderQuiz();
  }

  quizReiniciar.addEventListener("click", reiniciarQuiz);

  renderQuiz();
  actualizarContador();
</script>
